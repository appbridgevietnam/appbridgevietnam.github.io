<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Bridge – Ứng dụng của chúng tôi</title>

<style>

body{
  margin:0;
  background:#f5f5f7;
  color:#1d1d1f;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

header img{
  width:100%;
  max-height:420px;
  object-fit:cover;
  display:block;
}

.banner-text{
  text-align:center;
  font-size:18px;
  color:#6e6e73;
  margin:30px auto 60px;
  max-width:700px;
  line-height:1.6;
  padding:0 20px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:0 20px 80px;
}

h1{
  text-align:center;
  font-size:40px;
  font-weight:600;
  margin-bottom:50px;
}

.app-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

.app-card{
  background:white;
  border-radius:22px;
  padding:22px;
  display:flex;
  align-items:center;
  gap:20px;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

.app-card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.app-card img{
  width:72px;
  height:72px;
  border-radius:18px;
  object-fit:contain;
  background:#f5f5f7;
  padding:10px;
}

.app-info h3{
  margin:0;
  font-size:18px;
  font-weight:600;
}

.app-info p{
  margin:6px 0 0;
  color:#6e6e73;
  font-size:14px;
  line-height:1.5;
}

footer{
  border-top:1px solid #e5e5e7;
  text-align:center;
  padding:40px 20px;
  font-size:14px;
  color:#6e6e73;
  background:white;
}

footer a{
  color:#0071e3;
  text-decoration:none;
}

footer a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<header>
<img src="images/banner.jpg" alt="App Bridge Banner">
</header>

<div class="banner-text">
Khám phá công nghệ thông minh, mang lại niềm vui và tiện ích cho cuộc sống mỗi ngày.
</div>

<div class="container">

<h1>Ứng dụng của chúng tôi</h1>

<div class="app-list" id="appList"></div>

</div>

<footer>
<p>Nhà phát triển: <strong>App Bridge</strong></p>
<p>Email: <a href="mailto:appbridgevietnam@gmail.com">appbridgevietnam@gmail.com</a></p>
<p>Số điện thoại: <a href="tel:0986495949">0986495949</a></p>
<p>
<a href="https://play.google.com/store/apps/dev?id=6205244028782286901" target="_blank">
Xem tất cả ứng dụng trên Google Play
</a>
</p>
</footer>

<script>

const apps=[
{ name:"Công Suất Sạc", icon:"images/chargin-power-logo.png", desc:"Track charging current, power, and detailed battery status", url:"https://play.google.com/store/apps/details?id=vn.lecon.device.info" },
{ name:"Ngày Gọn Gàng", icon:"images/ngay-gon-gang-logo.png", desc:"Quản lý công việc trong ngày, đơn giản, hiệu quả, không cần tài khoản", url:"https://play.google.com/store/apps/details?id=vn.lecon.smart_todo_list" },
{ name:"Kết Nối WiFi", icon:"images/wifi-connection-logo.png", desc:"Tìm và kết nối Wi-Fi xung quanh dễ dàng, nhanh chóng và tiện lợi", url:"https://play.google.com/store/apps/details?id=vn.icheck.connect.wifi" },
{ name:"Tải Nhiều File(s)", icon:"images/tai-nhieu-files-logo.png", desc:"Ứng dụng giúp bạn tải cả một danh sách hàng trăm file một cách nhanh chóng", url:"https://play.google.com/store/apps/details?id=vn.lecon.download.files" }
];

const appList=document.getElementById("appList");

apps.forEach(app=>{
const card=document.createElement("div");
card.className="app-card";

card.innerHTML=`
<img src="${app.icon}" alt="${app.name}">
<div class="app-info">
<h3>${app.name}</h3>
<p>${app.desc}</p>
</div>
`;

card.onclick=()=>window.open(app.url,"_blank");

appList.appendChild(card);
});

</script>

</body>
</html>
